<script type="module">
import { GROUPS } from './chars.js';

const SK = 'cl_v5';
let state = {};
try { state = JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) { state = {}; }
function sv() { localStorage.setItem(SK, JSON.stringify(state)); }
function gp(id) { if (!state[id]) state[id] = {ef:2.5,iv:0,rp:0,nr:0,lr:null}; return state[id]; }
function up(id, q) {
  const p = gp(id);
  if (q === 0) { p.rp = 0; p.iv = 1; p.ef = Math.max(1.3, p.ef - 0.2); }
  else { if (p.rp === 0) p.iv = 1; else if (p.rp === 1) p.iv = 3; else p.iv = Math.round(p.iv * p.ef); p.rp++; if (q === 3) p.iv = Math.round(p.iv * 1.3); }
  p.ef = Math.max(1.3, p.ef + (q === 3 ? 0.15 : q === 2 ? 0.05 : -0.1));
  const n = new Date(); n.setHours(0,0,0,0);
  p.nr = n.getTime() + p.iv * 86400000;
  p.lr = q >= 2 ? 'ok' : 'fail';
  sv();
}
function getAll() { const a = []; GROUPS.forEach((g, gi) => g.chars.forEach((c, ci) => a.push({...c, id:gi+'-'+ci, gi}))); return a; }
function getDue() { const a = getAll(), n = new Date(); n.setHours(0,0,0,0); const now = n.getTime(); const d = a.filter(c => { const p = gp(c.id); return !p.nr || p.nr <= now; }); const nd = a.filter(c => !d.includes(c)).sort(() => Math.random() - 0.5); return [...d, ...nd.slice(0, Math.ceil(d.length * 0.35))].sort(() => Math.random() - 0.5); }
function getGStats(gi) { const g = GROUPS[gi]; let mastered = 0, learning = 0; g.chars.forEach((c, ci) => { const p = gp(gi+'-'+ci); if (p.rp >= 3 && p.iv >= 7) mastered++; else if (p.rp > 0) learning++; }); return {total: g.chars.length, mastered, learning, newChar: g.chars.length - mastered - learning}; }

// st(): remove tone marks from pinyin
// normalize: strip tone marks + ü→u + Ě→e (for "ě" like special chars)
function st(s) {
  // first replace bare ü/Ü before any tone stripping
  s = s.replace(/ü/g, 'u').replace(/Ü/g, 'U');
  return s.replace(/[āáǎàōóǒòēéěèīíǐìūúǔùǖǘǚǜ]/g, function(m) {
    const t = {'ā':'a','á':'a','ǎ':'a','à':'a','ō':'o','ó':'o','ǒ':'o','ò':'o','ē':'e','é':'e','ě':'e','è':'e','ī':'i','í':'i','ǐ':'i','ì':'i','ū':'u','ú':'u','ǔ':'u','ù':'u','ǖ':'u','ǘ':'u','ǚ':'u','ǜ':'u'};
    return t[m] || m;
  });

function ss(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'home') rh();
  if (id === 'groupSelect') rg();
  if (id === 'parentScreen') rp();
}

function rh() {
  const a = getAll(), n = new Date(); n.setHours(0,0,0,0); let due = 0, mas = 0;
  a.forEach(c => { const p = gp(c.id); if (!p.nr || p.nr <= n.getTime()) due++; if (p.rp >= 3 && p.iv >= 7) mas++; });

function _beginQuiz() {
  if (qM === 'mixed') {
    const gi = window._selGi;
    if (gi === -1) {
      const chars = getAll().sort(() => Math.random() - 0.5);
      qQ = chars.slice(0, Math.min(chars.length, 20));
    } else {
      const chars = GROUPS[gi].chars.map((c, ci) => ({...c, id:gi+'-'+ci, gi})).sort(() => Math.random() - 0.5);
      qQ = chars.slice(0, Math.min(chars.length, 20));
    }
  } else {
    const chars = getDue();
    if (chars.length === 0) { alert('今日已全部复习完！休息一下吧 🎉'); ss('home'); return; }
    qQ = chars.slice(0, Math.min(chars.length, 15));
  }
  qI = 0; qC = 0; qW = []; _busy = false;
  ss('quiz');
  rq();
}

  qM = m;
  const chars = getDue();
  if (chars.length === 0) { alert('今日已全部复习完！休息一下吧 🎉'); return; }
  qQ = chars.slice(0, Math.min(chars.length, 15));
  qI = 0; qC = 0; qW = []; _busy = false;
  ss('quiz');
  rq();
}

  qM = 'mixed';

function startAll() {
  qM = 'mixed';
  window._selGi = -1;
  const chars = getAll().sort(() => Math.random() - 0.5);
  qQ = chars.slice(0, Math.min(chars.length, 20));
  qI = 0; qC = 0; qW = []; _busy = false;
  ss('quiz');
  rq();
}

function rq() {
  closeHw();
  const t = qQ.length;
  document.getElementById('pFill').style.width = Math.round(qI / t * 100) + '%';
  document.getElementById('qCnt').textContent = (qI + 1) + '/' + t;
  _cur = qQ[qI];

  if (qM === 'pin') {
    document.getElementById('qPrompt').textContent = _cur.char;
    document.getElementById('qHint').textContent = qT === 'choice' ? '点选正确答案的拼音' : '用手写输入法写拼音，声调可写可不写';
  } else {
    const phrase = phraseMap[_cur.char] || '';
    if (phrase) {
      const idx = phrase.indexOf(_cur.char);
      const targetIsRight = idx === 1;
      const otherChar = targetIsRight ? phrase[0] : phrase[1];
      if (targetIsRight) {
        document.getElementById('qPrompt').innerHTML = '<div class="chr-layout"><div class="chr-other">' + otherChar + '</div><div class="chr-target">[' + _cur.pinyin + ']</div></div>';
      } else {
        document.getElementById('qPrompt').innerHTML = '<div class="chr-layout"><div class="chr-target">[' + _cur.pinyin + ']</div><div class="chr-other">' + otherChar + '</div></div>';
      }
    } else {
      document.getElementById('qPrompt').innerHTML = '<div class="chr-target">[' + _cur.pinyin + ']</div>';
    }
    document.getElementById('qHint').textContent = qT === 'choice' ? '点选正确答案的汉字' : '用手写输入法写出这个字';
  }

  if (qT === 'choice') {
    document.getElementById('chos').style.display = '';
    document.getElementById('hwPanel').classList.remove('active');
    renderChoices();
  } else {
    document.getElementById('chos').style.display = 'none';
    setTimeout(() => openHw(), 100);
  }
}

function renderChoices() {
  const isPin = qM === 'pin';
  const correct = isPin ? _cur.pinyin : _cur.char;
  // 从同组字中选干扰项
  const pool = qQ.filter(c => c.id !== _cur.id);
  const shuffled = pool.sort(() => Math.random() - 0.5);
  const distractorCount = Math.min(3, shuffled.length);
  _choices = shuffled.slice(0, distractorCount).map(c => isPin ? c.pinyin : c.char);
  // 随机插入正确选项
  const opts = [..._choices];
  const pos = Math.floor(Math.random() * (distractorCount + 1));
  opts.splice(pos, 0, correct);
  const container = document.getElementById('chos');
  container.innerHTML = '';
  opts.forEach((opt, i) => {
    const btn = document.createElement('div');
    btn.className = 'ch';
    btn.textContent = opt;
    btn.dataset.val = opt;
    btn.addEventListener('click', () => handleChoiceClick(opt, correct));
    container.appendChild(btn);
  });
}

function handleChoiceClick(val, correct) {
  if (_busy) return;
  _busy = true;
  const isOk = val === correct;
  document.querySelectorAll('.ch').forEach(b => {
    b.classList.add('wip');
    if (b.dataset.val === correct) b.classList.add('ok');
    if (!isOk && b.dataset.val === val) b.classList.add('no');
  });
  if (isOk) { qC++; up(_cur.id, 2); flash('\u2705', 400); }
  else { qW.push(_cur); up(_cur.id, 0); flash('\u274c', 900); }
  setTimeout(() => { qI++; _busy = false; if (qI >= qQ.length) showResult(); else rq(); }, isOk ? 600 : 1100);
}


function openHw() {
  const inp = document.getElementById('hwInput');
  inp.value = '';
  if (qM === 'pin') {
    document.getElementById('hwHint').textContent = '写拼音，声调可写可不写';
    inp.placeholder = '如 shuang / shuāng';
  } else {
    document.getElementById('hwHint').textContent = '用手写输入法写汉字';
    inp.placeholder = '写汉字，如 霜';
  }
  document.getElementById('hwPanel').classList.add('active');
  setTimeout(() => inp.focus(), 50);
}

function closeHw() {
  document.getElementById('hwPanel').classList.remove('active');
  document.getElementById('hwInput').blur();
}

function doSubmit(val, correct) {
  if (_busy) return;
  _busy = true;
  const isOk = qM === 'pin' ? st(val) === st(correct) || st(correct).includes(st(val)) : val === correct;
  document.querySelectorAll('.ch').forEach(b => {
    b.classList.add('wip');
    if (b.textContent === correct) b.classList.add('ok');
    if (!isOk && b.textContent === val) b.classList.add('no');
  });
  if (isOk) { qC++; up(_cur.id, 2); flash('\u2705', 400); }
  else { qW.push(_cur); up(_cur.id, 0); flash('\u274c', 900); }
  setTimeout(() => { qI++; _busy = false; if (qI >= qQ.length) showResult(); else rq(); }, isOk ? 600 : 1100);
}

function flash(emoji, ms) {
  const el = document.getElementById('qOv');
  document.getElementById('qRe').textContent = emoji;
  el.style.display = 'flex';
  setTimeout(() => { el.style.display = 'none'; }, ms);
}

function showResult() {
  closeHw();
  const t = qQ.length, pct = Math.round(qC / t * 100);
  const ti = pct >= 80 ? 0 : pct >= 60 ? 1 : pct >= 40 ? 2 : 3;
  const emojis = ['\ud83c\udf89','\ud83d\udc4d','\ud83d\udcaa','\ud83d\udcda'];
  const titles = ['太棒了！','很不错！','继续加油！','多练习几次！'];
  document.getElementById('rEmoji').textContent = emojis[ti];
  document.getElementById('rTitle').textContent = titles[ti];
  document.getElementById('rSub').textContent = '正确率 ' + qC + ' / ' + t + ' 题';
  document.getElementById('rStats').innerHTML = '<div class="rs1"><div class="n gn">'+qC+'</div><div class="l">正确</div></div><div class="rs1"><div class="n rd">'+(t-qC)+'</div><div class="l">错误</div></div><div class="rs1"><div class="n">'+pct+'%</div><div class="l">正确率</div></div>';
  const wb = document.getElementById('wrongBox');
  if (qW.length > 0) { wb.style.display = 'block'; document.getElementById('wrongChars').innerHTML = qW.map(c => '<span class="wc">'+c.char+'（'+c.pinyin+'）</span>').join(''); window._rw = [...qW]; }
  else { wb.style.display = 'none'; window._rw = []; }
  ss('resultScreen');
}

function rp() {
  const a = getAll();
  let mastered = 0, learning = 0;
  let masteredList = [], unmasteredList = [];
  a.forEach(c => {
    const p = gp(c.id);
    if (p.rp >= 3 && p.iv >= 7) {
      mastered++;
      masteredList.push(c);
    } else {
      if (p.rp > 0) learning++;
      unmasteredList.push(c);
    }
  });
  const pct = Math.round(mastered / a.length * 100);
  document.getElementById('overviewGrid').innerHTML = '<div class="oi"><div class="n">'+a.length+'</div><div class="l">总字数</div></div><div class="oi"><div class="n gld">'+learning+'</div><div class="l">学习中</div></div><div class="oi"><div class="n gn">'+mastered+'</div><div class="l">已掌握</div></div>';
  document.getElementById('mPct').textContent = pct + '%';
  document.getElementById('mFill').style.width = pct + '%';
  document.getElementById('mFill').textContent = pct >= 5 ? pct + '%' : '';
  const colors = ['#b3d0ff','#ffd0b3','#d0ffb3','#e0b3ff'];
  let ghtml = '';
  GROUPS.forEach((g, gi) => { const s = getGStats(gi); const pct2 = Math.round(s.mastered / s.total * 100); ghtml += '<div class="gpi"><div class="gph"><span class="gpn">'+g.name+'</span><span class="gpc">'+s.mastered+'/'+s.total+' 掌握</span></div><div class="gt"><div class="gff" style="width:'+pct2+'%;background:'+colors[gi%4]+'"></div></div></div>'; });
  document.getElementById('gpiList').innerHTML = ghtml;
  // mastered list: green chips with char + pinyin
  document.getElementById('masteredList').innerHTML = masteredList.length > 0
    ? masteredList.map(c => '<div class="char-chip"><span>'+c.char+'</span><span class="cp">'+c.pinyin+'</span></div>').join('')
    : '<div style="color:#7a7a7a;font-size:13px">还没有已掌握的字，加油练习吧！</div>';
  // unmastered list: gray chips for new, yellow for learning
  document.getElementById('unmasteredList').innerHTML = unmasteredList.length > 0
    ? unmasteredList.map(c => {
        const p = gp(c.id);
        const cls = p.rp === 0 ? 'new-chr' : '';
        const label = p.rp === 0 ? '新学' : '学习中';
        return '<div class="char-chip '+cls+'"><span>'+c.char+'</span><span class="cp">'+c.pinyin+'</span><span class="rp-label">'+label+'</span></div>';
      }).join('')
    : '<div style="color:#7a7a7a;font-size:13px">太棒了！全部掌握！🎉</div>';
}

function hwSubmit() {
  const val = document.getElementById('hwInput').value.trim();
  if (!val) { document.getElementById('hwInput').focus(); return; }
  const correct = qM === 'pin' ? _cur.pinyin : _cur.char;
  closeHw();
  doSubmit(val, correct);
}

  qT = qT === 'choice' ? 'handwrite' : 'choice';

  const tog = document.getElementById('modeToggle');
  if (qT === 'handwrite') { tog.classList.remove('on'); } else { tog.classList.add('on'); }
});
