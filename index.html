5s,background .15s,transform .1s}.ch:active{transform:scale(.96)}.ch.ok{border-color:#4ecb71;background:#e8fff0;color:#4ecb71}.ch.no{border-color:#ff6b6b;background:#fff0f0;color:#ff6b6b}.ch.wip{pointer-events:none;opacity:.6}.ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;pointer-events:none}.ov .re{font-size:110px;animation:bounce .5s ease}@keyframes bounce{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}.hw-panel{display:none;flex-direction:column;align-items:center;gap:8px;padding:12px 16px 16px;background:#fffdf8;border-top:2px solid #eee8de;width:100%;flex-shrink:0}.hw-panel.active{display:flex}.hw-hint{font-size:12px;color:#7a7a7a;text-align:center}.hw-input{width:100%;max-width:360px;padding:14px 16px;border:2.5px solid #eee8de;border-radius:12px;font-size:22px;font-weight:700;font-family:'Noto Sans SC',sans-serif;background:#fff;outline:none;color:#2d2d2d;text-align:center;display:block}.hw-input:focus{border-color:#ff8c42}.hw-input::placeholder{color:#ccc;font-size:14px;font-weight:400}.hw-row{width:100%;max-width:360px;display:flex;gap:8px}.hw-ok{flex:1;padding:12px;background:#4ecb71;color:#fff;border:0;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}.hw-ok:active{opacity:.85}.hw-cancel{flex:1;padding:12px;background:#fff;border:2px solid #eee8de;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;color:#7a7a7a}.rs{padding:24px 20px;overflow-y:auto}.rh{text-align:center;margin-bottom:24px}.rh .e{font-size:72px;display:block}.rh h2{font-size:26px;font-weight:900;margin:8px 0 4px}.rh p{color:#7a7a7a;font-size:14px}.rst{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px}.rs1{background:#fffdf8;border-radius:16px;padding:16px 10px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08);border:1px solid #eee8de}.rs1 .n{font-size:30px;font-weight:900}.rs1 .n.gn{color:#4ecb71}.rs1 .n.rd{color:#ff6b6b}.rs1 .l{font-size:11px;color:#7a7a7a;margin-top:4px}.wb{background:#fffdf8;border-radius:20px;padding:15px 18px;box-shadow:0 4px 20px rgba(0,0,0,.08);border:1px solid #eee8de;margin-bottom:20px}.wb h4{font-size:13px;font-weight:700;color:#7a7a7a;margin-bottom:10px}.wcs{display:flex;flex-wrap:wrap;gap:8px}.wc{background:#fff0f0;border:1.5px solid #ff6b6b;border-radius:10px;padding:5px 10px;font-size:13px;font-weight:700;color:#ff6b6b}.ra{display:flex;flex-direction:column;gap:10px}.bp{padding:15px;background:#5b8dee;color:#fff;border:0;border-radius:20px;font-size:15px;font-weight:700;cursor:pointer;width:100%}.bp:active{background:#3b6fd4}.bs{padding:13px;background:#fffdf8;color:#2d2d2d;border:2px solid #eee8de;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;width:100%}.bs:active{background:#f5f0e8}.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}.ph h2{font-size:19px;font-weight:900}.bx{width:34px;height:34px;border-radius:10px;background:#fffdf8;border:1px solid #eee8de;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}.cd{background:#fffdf8;border-radius:20px;padding:16px 18px;box-shadow:0 4px 20px rgba(0,0,0,.08);border:1px solid #eee8de;margin-bottom:14px}.cd h3{font-size:11px;color:#7a7a7a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}.cd-title-row{display:flex;align-items:center;gap:4px;flex-wrap:nowrap}.og{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.oi{text-align:center}.oi .n{font-size:28px;font-weight:900;color:#5b8dee}.oi .n.gn{color:#4ecb71}.oi .n.gld{color:#ff8c42}.oi .l{font-size:10px;color:#7a7a7a;margin-top:2px}.ml{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:5px}.mt{height:12px;background:#eee8de;border-radius:999px;overflow:hidden}.mf{height:100%;background:linear-gradient(90deg,#4ecb71,#7ddf92);border-radius:999px;transition:width .6s;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:c ex;flex-direction:column;gap:12px}.imb{background:#fffdf8;border:3px solid #eee8de;border-radius:20px;padding:24px 20px;cursor:pointer;text-align:center;transition:border-color .15s,transform .1s}.imb:active{transform:scale(.98)}.imb.chs{border-color:#5b8dee}.imb.chs:active{border-color:#3b6fd4}.imb.hw{border-color:#ff8c42}.imb.hw:active{border-color:#e07030}.imb .ime{font-size:48px;display:block;margin-bottom:8px}.imb h3{font-size:16px;font-weight:700;margin-bottom:4px}.imb p{font-size:12px;color:#7a7a7a;margin:0}

<body>
<div id="home" class="screen active h">
  <div class="home-header"><span class="e">📚</span><h1>认字小助手</h1><p>一年级下学期 · 二类字练习</p></div>
  <div class="stats" id="homeStats"></div>
  <p style="font-size:12px;color:#aaa;text-align:center;margin-bottom:20px">✅ 已掌握 = 连续答对3次</p>
  <div class="section-title">选择练习模式</div>
  <div class="modes">
    <div class="mode pin" id="btnPin"><span class="me">🔤</span><h3>字 → 拼音</h3><p>看汉字，写拼音</p><span class="badge" id="pinBadge">0 字待复习</span></div>
    <div class="mode chr" id="btnChr"><span class="me">📝</span><h3>拼音 → 字</h3><p>看拼音，写汉字</p><span class="badge" id="chrBadge">0 字待复习</span></div>
  </div>
  <button class="btn" id="btnGroup">📖 按组练习</button>
  <button class="btn" id="btnParent">👨‍👩‍👧 家长面板</button>
</div>

<div id="groupSelect" class="screen h">
  <div class="topbar"><button class="bk" id="btnBackHome">←</button><div class="tt">选择练习范围</div></div>
  <div class="glist" id="glist"></div>
  <button class="abtn" id="btnAll">练习全部字（<span id="tCnt">0</span>字）</button>
</div>

<div id="inputSelect" class="screen h">
  <div class="topbar"><button class="bk" id="btnBackMode">←</button><div class="tt" id="iModeTitle">选择答题方式</div></div>
  <div class="imode">
    <h2 id="iModeSub">准备好了吗？</h2>
    <p id="iModeDesc">选择一种方式来答题</p>
    <div class="im-btns">
      <div class="imb chs" id="btnIchs">
        <span class="ime">☑️</span>
        <h3>选择答题</h3>
        <p>看题后点选正确答案</p>
      </div>
      <div class="imb hw" id="btnIhw">
        <span class="ime">✍️</span>
        <h3>手写输入</h3>
        <p>用手写输入法书写拼音或汉字</p>
      </div>
    </div>
  </div>
</div>

<div id="quiz" class="screen">
  <div class="quiz-top"><button class="qb" id="btnQuit">✕</button><div class="qp"><div class="qf" id="pFill"></div></div><div class="qc" id="qCnt">1/10</div></div>
  <div class="qa">
    <div class="qpr" id="qPrompt"></div>
    <div class="qhi" id="qHint"></div>
  </div>
  <div class="hw-panel" id="hwPanel">
    <div class="hw-hint" id="hwHint"></div>
    <input class="hw-input" id="hwInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder=""/>
    <div class="hw-row"><button class="hw-ok" id="hwOkBtn">✓ 确认</button><button class="hw-cancel" id="hwCancelBtn">取消</button></div>
  </div>
  <div class="ov" id="qOv" style="display:none"><div class="re" id="qRe"></div></div>
</div>

<div id="resultScreen" class="screen h">
  <div class="rh"><span class="e" id="rEmoji">🎉</span><h2 id="rTitle">太棒了！</h2><p id="rSub"></p></div>
  <div class="rst" id="rStats"></div>
  <div class="wb" id="wrongBox" style="display:none"><h4>这些字还需要多练习 👇</h4><div class="wcs" id="wrongChars"></div></div>
  <div class="ra"><button class="bp" id="retryBtn">再练一遍</button><button class="bs" id="btnBackHome2">返回首页</button></div>
</div>

<div id="parentScreen" class="screen h">
  <div class="ph"><h2>👨‍👩‍👧 家长面板</h2><button class="bx" id="btnCloseParent">✕</button></div>
  <div class="cd"><h3>总体掌握</h3><div class="og" id="overviewGrid"></div><div class="ml"><span>总体掌握率</span><span id="mPct">0%</span></div><div class="mt"><div class="mf" id="mFill" style="width:0%"></div></div></div>
  <div class="cd"><h3>各组进度</h3><div id="gpiList"></div></div>
  <div class="cd"><div class="cd-title-row"><h3>✅ 已掌握的字</h3><button class="info-btn" id="infoBtn">?</button><div class="info-tip" id="infoTip">连续答对3次，该字即被掌握</div></div><div class="char-list" id="masteredList"></div></div>
  <div class="cd"><h3>📖 还未掌握的字</h3><div class="char-list tall" id="unmasteredList"></div></div>
  <button class="rbtn" id="btnReset">🗑️ 重置所有进度</button>
</div>

<script type="module">
import { GROUPS } from './chars.js';

const SK = 'cl_v5';
let state = {};
try { state = JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) { state = {}; }
function sv() { localStorage.setItem(SK, JSON.stringify(state)); }
function gp(id) { if (!state[id]) state[id] = {ef:2.5,iv:0,rp:0,nr:0,lr:null}; return state[id]; }
function up(id, q) {
  const p = gp(id);
  if (q === 0) { p.rp = 0; p.iv = 1; p.ef = Math.max(1.3, p.ef - 0.2); }
  else { if (p.rp === 0) p.iv = 1; else if (p.rp === 1) p.iv = 3; else p.iv = Math.round(p.iv * p.ef); p.rp++; if (q === 3) p.iv = Math.round(p.iv * 1.3); }
  p.ef = Math.max(1.3, p.ef + (q === 3 ? 0.15 : q === 2 ? 0.05 : -0.1));
  const n = new Date(); n.setHours(0,0,0,0);
  p.nr = n.getTime() + p.iv * 86400000;
  p.lr = q >= 2 ? 'ok' : 'fail';
  sv();
}
function getAll() { const a = []; GROUPS.forEach((g, gi) => g.chars.forEach((c, ci) => a.push({...c, id:gi+'-'+ci, gi}))); return a; }
function getDue() { const a = getAll(), n = new Date(); n.setHours(0,0,0,0); const now = n.getTime(); const d = a.filter(c => { const p = gp(c.id); return !p.nr || p.nr <= now; }); const nd = a.filter(c => !d.includes(c)).sort(() => Math.random() - 0.5); return [...d, ...nd.slice(0, Math.ceil(d.length * 0.35))].sort(() => Math.random() - 0.5); }
function getGStats(gi) { const g = GROUPS[gi]; let mastered = 0, learning = 0; g.chars.forEach((c, ci) => { const p = gp(gi+'-'+ci); if (p.rp >= 3 && p.iv >= 7) mastered++; else if (p.rp > 0) learning++; }); return {total: g.chars.length, mastered, learning, newChar: g.chars.length - mastered - learning}; }

// st(): remove tone marks from pinyin
// normalize: strip tone marks + ü→u + Ě→e (for "ě" like special chars)
function st(s) {
  // first replace bare ü/Ü before any tone stripping
  s = s.replace(/ü/g, 'u').replace(/Ü/g, 'U');
  return s.replace(/[āáǎàōóǒòēéěèīíǐìūúǔùǖǘǚǜ]/g, function(m) {
    const t = {'ā':'a','á':'a','ǎ':'a','à':'a','ō':'o','ó':'o','ǒ':'o','ò':'o','ē':'e','é':'e','ě':'e','è':'e','ī':'i','í':'i','ǐ':'i','ì':'i','ū':'u','ú':'u','ǔ':'u','ù':'u','ǖ':'u','ǘ':'u','ǚ':'u','ǜ':'u'};
    return t[m] || m;
  });
}

let qM = 'pin', qQ = [], qI = 0, qC = 0, qW = [], _cur = null, _busy = false;

function ss(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'home') rh();
  if (id === 'groupSelect') rg();
  if (id === 'parentScreen') rp();
}

function rh() {
  const a = getAll(), n = new Date(); n.setHours(0,0,0,0); let due = 0, mas = 0;
  a.forEach(c => { const p = gp(c.id); if (!p.nr || p.nr <= n.getTime()) due++; if (p.rp >= 3 && p.iv >= 7) mas++; });
  document.getElementById('homeStats').innerHTML = '<div class="s"><div class="n">'+due+'</div><div class="l">今日待复习</div></div><div class="s"><div class="n gn">'+mas+'</div><div class="l">已掌握</div></div><div class="s"><div class="n g">'+Object.keys(state).length+'</div><div class="l">练习字数</div></div>';
  document.getElementById('pinBadge').textContent = due+' 字待复习';
  document.getElementById('chrBadge').textContent = due+' 字待复习';
}

function rg() {
  const a = getAll(); document.getElementById('tCnt').textContent = a.length;
  const colors = ['#b3d0ff','#ffd0b3','#d0ffb3','#e0b3ff'];
  let html = '';
  GROUPS.forEach((g, gi) => {
    const s = getGStats(gi); const pct = Math.round(s.mastered / s.total * 100);
    html += '<div class="gc" data-gi="'+gi+'"><h3>'+g.name+'</h3><div class="pb"><div class="pf" style="width:'+pct+'%;background:'+colors[gi%4]+'"></div></div><div class="pt">已掌握 <strong>'+s.mastered+'</strong> / '+s.total+' 字　新学 <strong>'+s.newChar+'</strong></div></div>';
  });
  document.getElementById('glist').innerHTML = html;
}

function startQuiz(m) {
  qM = m;
  const chars = getDue();
  if (chars.length === 0) { alert('今日已全部复习完！休息一下吧 🎉'); return; }
  qQ = chars.slice(0, Math.min(chars.length, 15));
  qI = 0; qC = 0; qW = []; _busy = false;
  ss('quiz');
  rq();
}

function startG(gi) {
  qM = 'mixed';
  const chars = GROUPS[gi].chars.map((c, ci) => ({...c, id:gi+'-'+ci, gi})).sort(() => Math.random() - 0.5);
  qQ = chars.slice(0, Math.min(chars.length, 20));
  qI = 0; qC = 0; qW = []; _busy = false;
  ss('quiz');
  rq();
}

function startAll() {
  qM = 'mixed';
  const chars = getAll().sort(() => Math.random() - 0.5);
  qQ = chars.slice(0, Math.min(chars.length, 20));
  qI = 0; qC = 0; qW = []; _busy = false;
  ss('quiz');
  rq();
}

function rq() {
  closeHw();
  const t = qQ.length;
  document.getElementById('pFill').style.width = Math.round(qI / t * 100) + '%';
  document.getElementById('qCnt').textContent = (qI + 1) + '/' + t;
  _cur = qQ[qI];
  if (qM === 'pin') {
    document.getElementById('qPrompt').textContent = _cur.char;
    document.getElementById('qHint').textContent = '用手写输入法写出这个字的拼音';
  } else {
    document.getElementById('qPrompt').textContent = _cur.pinyin;
    document.getElementById('qHint').textContent = '用手写输入法写出这个字';
  }
  setTimeout(() => openHw(), 100);
}


function openHw() {
  const inp = document.getElementById('hwInput');
  inp.value = '';
  if (qM === 'pin') {
    document.getElementById('hwHint').textContent = '写拼音，不需要声调';
    inp.placeholder = '如 shuang';
  } else {
    document.getElementById('hwHint').textContent = '用手写输入法写汉字';
    inp.placeholder = '写汉字，如 霜';
  }
  document.getElementById('hwPanel').classList.add('active');
  setTimeout(() => inp.focus(), 50);
}

function closeHw() {
  document.getElementById('hwPanel').classList.remove('active');
  document.getElementById('hwInput').blur();
}

function doSubmit(val, correct) {
  if (_busy) return;
  _busy = true;
  const isOk = qM === 'pin' ? st(val) === st(correct) || st(correct).includes(st(val)) : val === correct;
  document.querySelectorAll('.ch').forEach(b => {
    b.classList.add('wip');
    if (b.textContent === correct) b.classList.add('ok');
    if (!isOk && b.textContent === val) b.classList.add('no');
  });
  if (isOk) { qC++; up(_cur.id, 2); flash('\u2705', 400); }
  else { qW.push(_cur); up(_cur.id, 0); flash('\u274c', 900); }
  setTimeout(() => { qI++; _busy = false; if (qI >= qQ.length) showResult(); else rq(); }, isOk ? 600 : 1100);
}

function flash(emoji, ms) {
  const el = document.getElementById('qOv');
  document.getElementById('qRe').textContent = emoji;
  el.style.display = 'flex';
  setTimeout(() => { el.style.display = 'none'; }, ms);
}

function showResult() {
  closeHw();
  const t = qQ.length, pct = Math.round(qC / t * 100);
  const ti = pct >= 80 ? 0 : pct >= 60 ? 1 : pct >= 40 ? 2 : 3;
  const emojis = ['\ud83c\udf89','\ud83d\udc4d','\ud83d\udcaa','\ud83d\udcda'];
  const titles = ['太棒了！','很不错！','继续加油！','多练习几次！'];
  document.getElementById('rEmoji').textContent = emojis[ti];
  document.getElementById('rTitle').textContent = titles[ti];
  document.getElementById('rSub').textContent = '正确率 ' + qC + ' / ' + t + ' 题';
  document.getElementById('rStats').innerHTML = '<div class="rs1"><div class="n gn">'+qC+'</div><div class="l">正确</div></div><div class="rs1"><div class="n rd">'+(t-qC)+'</div><div class="l">错误</div></div><div class="rs1"><div class="n">'+pct+'%</div><div class="l">正确率</div></div>';
  const wb = document.getElementById('wrongBox');
  if (qW.length > 0) { wb.style.display = 'block'; document.getElementById('wrongChars').innerHTML = qW.map(c => '<span class="wc">'+c.char+'（'+c.pinyin+'）</span>').join(''); window._rw = [...qW]; }
  else { wb.style.display = 'none'; window._rw = []; }
  ss('resultScreen');
}

function rp() {
  const a = getAll();
  let mastered = 0, learning = 0;
  let masteredList = [], unmasteredList = [];
  a.forEach(c => {
    const p = gp(c.id);
    if (p.rp >= 3 && p.iv >= 7) {
      mastered++;
      masteredList.push(c);
    } else {
      if (p.rp > 0) learning++;
      unmasteredList.push(c);
    }
  });
  const pct = Math.round(mastered / a.length * 100);
  document.getElementById('overviewGrid').innerHTML = '<div class="oi"><div class="n">'+a.length+'</div><div class="l">总字数</div></div><div class="oi"><div class="n gld">'+learning+'</div><div class="l">学习中</div></div><div class="oi"><div class="n gn">'+mastered+'</div><div class="l">已掌握</div></div>';
  document.getElementById('mPct').textContent = pct + '%';
  document.getElementById('mFill').style.width = pct + '%';
  document.getElementById('mFill').textContent = pct >= 5 ? pct + '%' : '';
  const colors = ['#b3d0ff','#ffd0b3','#d0ffb3','#e0b3ff'];
  let ghtml = '';
  GROUPS.forEach((g, gi) => { const s = getGStats(gi); const pct2 = Math.round(s.mastered / s.total * 100); ghtml += '<div class="gpi"><div class="gph"><span class="gpn">'+g.name+'</span><span class="gpc">'+s.mastered+'/'+s.total+' 掌握</span></div><div class="gt"><div class="gff" style="width:'+pct2+'%;background:'+colors[gi%4]+'"></div></div></div>'; });
  document.getElementById('gpiList').innerHTML = ghtml;
  // mastered list: green chips with char + pinyin
  document.getElementById('masteredList').innerHTML = masteredList.length > 0
    ? masteredList.map(c => '<div class="char-chip"><span>'+c.char+'</span><span class="cp">'+c.pinyin+'</span></div>').join('')
    : '<div style="color:#7a7a7a;font-size:13px">还没有已掌握的字，加油练习吧！</div>';
  // unmastered list: gray chips for new, yellow for learning
  document.getElementById('unmasteredList').innerHTML = unmasteredList.length > 0
    ? unmasteredList.map(c => {
        const p = gp(c.id);
        const cls = p.rp === 0 ? 'new-chr' : '';
        const label = p.rp === 0 ? '新学' : '学习中';
        return '<div class="char-chip '+cls+'"><span>'+c.char+'</span><span class="cp">'+c.pinyin+'</span><span class="rp-label">'+label+'</span></div>';
      }).join('')
    : '<div style="color:#7a7a7a;font-size:13px">太棒了！全部掌握！🎉</div>';
}

function hwSubmit() {
  const val = document.getElementById('hwInput').value.trim();
  if (!val) { document.getElementById('hwInput').focus(); return; }
  const correct = qM === 'pin' ? _cur.pinyin : _cur.char;
  closeHw();
  doSubmit(val, correct);
}

// EVENT BINDINGS
document.getElementById('btnPin').addEventListener('click', () => startQuiz('pin'));
document.getElementById('btnChr').addEventListener('click', () => startQuiz('chr'));
document.getElementById('btnGroup').addEventListener('click', () => ss('groupSelect'));
document.getElementById('btnParent').addEventListener('click', () => ss('parentScreen'));
document.getElementById('btnBackHome').addEventListener('click', () => ss('home'));
document.getElementById('btnBackHome2').addEventListener('click', () => ss('home'));
document.getElementById('btnAll').addEventListener('click', startAll);
document.getElementById('glist').addEventListener('click', e => { const gc = e.target.closest('.gc'); if (gc) startG(parseInt(gc.dataset.gi)); });
document.getElementById('btnQuit').addEventListener('click', () => { if (confirm('确定退出练习？')) ss('home'); });
document.getElementById('retryBtn').addEventListener('click', () => { if (window._rw && window._rw.length > 0) { qQ = window._rw.slice().sort(() => Math.random() - 0.5); qI = 0; qC = 0; qW = []; _busy = false; ss('quiz'); rq(); } });
document.getElementById('btnCloseParent').addEventListener('click', () => ss('home'));

document.getElementById('btnReset').addEventListener('click', () => { if (confirm('确定要重置所有进度吗？此操作不可撤销。')) { state = {}; sv(); rp(); } });
document.getElementById('hwOkBtn').addEventListener('click', hwSubmit);
document.getElementById('hwCancelBtn').addEventListener('click', closeHw);
document.getElementById('hwInput').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); hwSubmit(); } });

document.getElementById('infoBtn').addEventListener('click', function(e) { e.stopPropagation(); document.getElementById('infoTip').classList.toggle('show'); });
document.addEventListener('click', function() { document.getElementById('infoTip').classList.remove('show'); });

rh();
</script>
